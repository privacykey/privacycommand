name: Bug report
description: Report something in privacycommand that isn't working as expected — analyzer findings, helper, monitored runs, updates, etc.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
# Tip: the `report-type`, `area`, `install-method`, and `helper-status`
# fields below surface quickly in the rendered issue so triagers can
# scan platform / install / capability state at a glance without
# reading the whole form.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you
        can give below, the faster we can reproduce and fix it.

        **Before you submit a security finding** — please don't open a
        public issue. Email `security@privacykey.org` instead. See
        [SECURITY.md](../blob/main/SECURITY.md) (if present) or the
        Security disclosures section of the README.

  - type: dropdown
    id: report-type
    attributes:
      label: What kind of report is this?
      description: |
        Pick the category that fits — leave it on "Feature bug" if
        unsure.
      multiple: false
      options:
        - Feature bug
        - Crash / hang
        - False positive in analyzer findings
        - False negative — analyzer missed something
        - Onboarding / install issue
        - Documentation correction
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you expect, and what actually happened?
      placeholder: |
        I dropped a .app bundle on the window and the Static tab said
        the binary had no embedded launch agents, but I can see the
        plist inside Contents/Library/LaunchAgents.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step. Mention which bundle you were inspecting if it's a public app — most reports turn into "what's this app's bundle?" within two replies otherwise.
      placeholder: |
        1. Launch privacycommand.
        2. Drop "/Applications/Foo.app" onto the drop target.
        3. Click the Static tab, scroll to "Embedded scripts & launchd".
        4. Section reports zero items, but `ls` of Contents/Library/LaunchAgents shows two plists.
    validations:
      required: true

  - type: input
    id: inspected-app
    attributes:
      label: Inspected app (if relevant)
      description: |
        Bundle ID and version of the app you were *inspecting* (not
        privacycommand itself). Skip for general / non-app-specific bugs.
      placeholder: "com.example.Foo · v1.2.3"
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install privacycommand?
      multiple: false
      options:
        - Homebrew Cask (`brew install privacykey/tap/privacycommand`)
        - Direct download (DMG from GitHub Releases)
        - Built from source (Xcode)
        - Built from source (`swift build`)
        - Other (describe in the summary)
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: privacycommand version
      description: |
        From Settings → About, or `mdls -name kMDItemVersion /Applications/privacycommand.app` for installed builds. Source builds: paste `git rev-parse --short HEAD`.
      placeholder: "v0.2.0 · or commit abc1234"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version + chip
      description: |
        Apple menu → About This Mac. Both the macOS version and the
        chip family matter — some bugs only surface on Apple Silicon
        or only on Intel.
      placeholder: "macOS 14.5 · Apple M2 Pro · or · macOS 13.6 · Intel"
    validations:
      required: true

  - type: dropdown
    id: helper-status
    attributes:
      label: Privileged helper status
      description: |
        Settings → Helper → "Status" row. The helper isn't required
        for every feature, but several signals (file events, BTM
        audit, network kill switch) depend on it being installed.
      multiple: false
      options:
        - "Installed (green shield)"
        - "Requires approval (waiting on Login Items toggle)"
        - "Not registered (helper bundled but not installed)"
        - "Not found (helper not bundled in the app)"
        - "Not relevant to this bug"
    validations:
      required: true

  - type: checkboxes
    id: area
    attributes:
      label: Which area of the app?
      description: Pick whichever apply — helps us route the issue to the right surface area.
      options:
        - label: Static analysis (Static tab)
          required: false
        - label: Dashboard (telemetry / privacy labels / live probes)
          required: false
        - label: Monitored run (file events / network / processes)
          required: false
        - label: Watch mode / menu-bar
          required: false
        - label: Privileged helper (install / connection / fs_usage)
          required: false
        - label: Network kill switch (pf rules)
          required: false
        - label: BTM audit (Background Task Management / sfltool)
          required: false
        - label: VM mode / guest agent
          required: false
        - label: App Store privacy-label fetch
          required: false
        - label: Updates (Sparkle / Homebrew)
          required: false
        - label: Reports / export (JSON / HTML / PDF)
          required: false
        - label: Onboarding wizard
          required: false
        - label: Settings / preferences
          required: false
        - label: Accessibility (VoiceOver, dynamic type, contrast)
          required: false
        - label: Other / not sure
          required: false

  - type: textarea
    id: console-logs
    attributes:
      label: Console logs
      description: |
        Most native-app bugs leave a trail in the unified log. Run one
        of these in Terminal *while reproducing the bug*, then paste
        the output here:

        ```sh
        log stream --predicate 'process == "privacycommand"' --info --debug
        log stream --predicate 'process == "privacycommandHelper"' --info --debug
        ```

        Or open Console.app, filter by `privacycommand`, and copy any
        red entries. Don't worry about scrubbing — we only need enough
        context to reproduce.
      render: shell
    validations:
      required: false

  - type: textarea
    id: crash-trace
    attributes:
      label: Crash trace (if applicable)
      description: |
        For a crash report, paste the contents of the `.ips` file from
        `~/Library/Logs/DiagnosticReports/`. macOS stamps these as
        plain JSON since macOS 12 — it's safe to paste verbatim.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots (optional)
      description: Drag-and-drop images into this field. Annotated screenshots speed up triage enormously for visual bugs.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I can reproduce this consistently (or I've described the conditions under which it happens).
          required: false
        - label: This is **not** a security vulnerability. (Security issues should go to `security@privacykey.org`, not a public issue.)
          required: true
