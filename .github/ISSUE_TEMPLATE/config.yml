# Disable blank issues so every report starts from a template — makes
# triage much faster because the structured fields (install method,
# macOS version, helper status) are always present. Users who need a
# blank canvas can open a Discussion via the link below.
blank_issues_enabled: false

contact_links:
  - name: Question or discussion
    url: https://github.com/privacykey/privacycommand/discussions
    about: For open-ended questions, ideas, or "is this expected?" — use Discussions instead of an issue.

  - name: Security disclosure
    url: mailto:security@privacykey.org?subject=privacycommand%20security%20disclosure
    about: Found a vulnerability? Please don't open a public issue. Email security@privacykey.org — we aim to respond within 72 hours.

  - name: Accessibility feedback
    url: https://github.com/privacykey/privacycommand/issues/new?template=bug_report.yml&labels=bug,needs-triage,a11y&title=%5BA11y%5D%3A+
    about: Filing an accessibility issue? Use the bug-report template — it'll be auto-tagged a11y.

  - name: False positive in analyzer findings
    url: https://github.com/privacykey/privacycommand/issues/new?template=bug_report.yml&labels=bug,needs-triage,false-positive&title=%5BFP%5D%3A+
    about: Did privacycommand flag something that's actually fine? Use the bug-report template — it'll be auto-tagged false-positive.
