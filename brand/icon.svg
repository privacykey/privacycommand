  <title>privacycommand app icon</title>
  <desc>Macos app icon for privacycommand. A deep indigo squircle with a binary 'command' rain falling behind a soft-square gradient shield. Inside the shield, a white inner panel holds a dark stroked command glyph drawn from the proper ⌘ path. A yellow magnifier badge sits in the lower-right corner with a white lens ring and handle fully contained within the disc. Sub-product of privacykey, sibling to privacytracker.</desc>
