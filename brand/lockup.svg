  <title>privacycommand horizontal lockup</title>
  <desc>Horizontal brand lockup pairing the icon and wordmark side by side. Icon includes binary 'command' rain behind the gradient shield, white inner panel with proper command glyph, and yellow magnifier badge with contained white lens. The wordmark renders 'privacy' in currentColor and 'command' with a vertical purple gradient drawn from the parent privacykey palette.</desc>
